services:
  database:
    image: mariadb:latest
    env_file:
      - .env.example
    volumes:
      - data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"
    networks:
      - app-net  # <-- ADD THIS

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.example
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-net  # <-- ADD THIS
    restart: on-failure
    healthcheck:  # <-- 1. ADD THIS HEALTHCHECK
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    networks:
      - app-net
    depends_on:  # <-- 2. ADD THIS DEPENDENCY
      backend:
        condition: service_healthy

volumes:
  data:

networks:
  app-net:
    driver: bridge