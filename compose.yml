services:
  database:
    image: mariadb:latest
    env_file:
      - .env.example
    volumes:
      - data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"
    networks:
      - app-net  # <-- ADD THIS

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.example
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-net  # <-- ADD THIS
    restart: on-failure
  
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    networks:
      - app-net
    depends_on:  # <-- 2. ADD THIS DEPENDENCY
      - backend

volumes:
  data:

networks:
  app-net:
    driver: bridge
